<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">bitpixi profile banner</title>
  <desc id="desc">A rose-toned banner with the text bitpixi, creative technologist, and a quote panel.</desc>
  <defs>
    <linearGradient id="bg" x1="74" y1="24" x2="1134" y2="302" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8FA"/>
      <stop offset="0.42" stop-color="#F7E8EE"/>
      <stop offset="1" stop-color="#EED4DE"/>
    </linearGradient>
    <linearGradient id="panel" x1="780" y1="56" x2="1116" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8FA" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#F5E1E8" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="shadow" x="720" y="40" width="420" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#A8647C" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="1180" height="300" rx="28" fill="url(#bg)"/>
  <rect x="10" y="10" width="1180" height="300" rx="28" stroke="#E5BCC9" stroke-width="1.5"/>

  <g filter="url(#shadow)">
    <rect x="732" y="52" width="388" height="190" rx="26" fill="url(#panel)"/>
    <rect x="732" y="52" width="388" height="190" rx="26" stroke="#E1B6C5" stroke-width="1.2"/>
  </g>

  <text x="90" y="138" fill="#482733" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="700" letter-spacing="0.3">bitpixi</text>
  <text x="92" y="188" fill="#7A495C" font-family="'Trebuchet MS', Arial, sans-serif" font-size="34" font-weight="700">creative technologist</text>
  <text x="92" y="240" fill="#6A4150" font-family="'Trebuchet MS', Arial, sans-serif" font-size="27">
    agentic systems • social platforms • virtual worlds
  </text>

  <text x="926" y="138" text-anchor="middle" fill="#5C3140" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-style="italic">
    The ending has not yet
  </text>
  <text x="926" y="172" text-anchor="middle" fill="#5C3140" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-style="italic">
    been written.
  </text>
  <text x="926" y="212" text-anchor="middle" fill="#7A495C" font-family="'Trebuchet MS', Arial, sans-serif" font-size="18" font-weight="600">
    - Atrus, Myst (1993)
  </text>
</svg>
